name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ] # Запускать при пуше в эти ветки
  pull_request:
    branches: [ "main", "master" ] # И при создании PR

jobs:
  build:
    runs-on: ubuntu-latest # Берем чистую Ubuntu в облаке GitHub

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4 # Шаг 1: Копируем твой код на этот сервер

    - name: Set up JDK 21 # Шаг 2: Ставим Джаву (проверь свою версию!)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Кэшируем зависимости, чтобы билд шел быстрее

    - name: Build with Maven # Шаг 3: Сама сборка
      run: mvn -B package --file pom.xml
